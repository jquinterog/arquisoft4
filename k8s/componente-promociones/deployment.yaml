apiVersion: apps/v1
kind: Deployment
metadata:
  name: componente-promociones
  namespace: arquisoft-local
spec:
  replicas: 1
  selector:
    matchLabels:
      app: componente-promociones
  template:
    metadata:
      labels:
        app: componente-promociones
    spec:
      containers:
        - name: componente-promociones
          image: arquisoft/componente-promociones:local
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: componente-promociones-config
            - secretRef:
                name: componente-promociones-secret
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 20
