services:
  db:
    image: postgres:16-alpine
    container_name: teknoshop-db
    environment:
      POSTGRES_DB: teknoshop_campaigns
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d teknoshop_campaigns"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    container_name: teknoshop-api
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/teknoshop_campaigns
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
